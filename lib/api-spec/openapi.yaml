openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: Zawadi — Premium Kenyan Corporate Gifting Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalogue management
  - name: categories
    description: Product categories
  - name: suppliers
    description: Supplier onboarding and management
  - name: collections
    description: Curated gift collections
  - name: hampers
    description: Custom hamper builder
  - name: corporates
    description: Corporate account management
  - name: quotes
    description: Instant quote engine
  - name: orders
    description: Order lifecycle management
  - name: recipients
    description: Bulk recipient management and personalisation
  - name: invoices
    description: KRA-compliant invoicing
  - name: dashboard
    description: Analytics and dashboard data

paths:
  # ── Health ────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Categories ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: category_id
          in: query
          schema: { type: string }
        - name: supplier_id
          in: query
          schema: { type: string }
        - name: occasion
          in: query
          schema: { type: string }
        - name: min_price
          in: query
          schema: { type: number }
        - name: max_price
          in: query
          schema: { type: number }
        - name: search
          in: query
          schema: { type: string }
        - name: is_featured
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 24 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product (admin/supplier)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  # ── Suppliers ─────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      parameters:
        - name: is_verified
          in: query
          schema: { type: boolean }
        - name: county
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Submit a supplier application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier details and story
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update supplier profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierInput"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  # ── Collections ───────────────────────────────────────────────────────────
  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List curated gift collections
      parameters:
        - name: occasion
          in: query
          schema: { type: string }
        - name: is_featured
          in: query
          schema: { type: boolean }
        - name: min_price
          in: query
          schema: { type: number }
        - name: max_price
          in: query
          schema: { type: number }
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a curated collection (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionInput"
      responses:
        "201":
          description: Created collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    get:
      operationId: getCollection
      tags: [collections]
      summary: Get collection details with products
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Collection with products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionWithProducts"
    put:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionInput"
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  # ── Hampers ───────────────────────────────────────────────────────────────
  /hampers:
    get:
      operationId: listHampers
      tags: [hampers]
      summary: List saved hamper configurations for a corporate
      parameters:
        - name: corporate_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of hampers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hamper"
    post:
      operationId: createHamper
      tags: [hampers]
      summary: Create / save a custom hamper configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHamperInput"
      responses:
        "201":
          description: Created hamper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hamper"

  /hampers/{id}:
    get:
      operationId: getHamper
      tags: [hampers]
      summary: Get a hamper with all items
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Hamper details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HamperWithItems"
    put:
      operationId: updateHamper
      tags: [hampers]
      summary: Update hamper items
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHamperInput"
      responses:
        "200":
          description: Updated hamper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hamper"
    delete:
      operationId: deleteHamper
      tags: [hampers]
      summary: Delete a hamper
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  # ── Corporates ────────────────────────────────────────────────────────────
  /corporates:
    get:
      operationId: listCorporates
      tags: [corporates]
      summary: List corporate accounts (admin)
      parameters:
        - name: tier
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of corporates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Corporate"
    post:
      operationId: createCorporate
      tags: [corporates]
      summary: Register a new corporate account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCorporateInput"
      responses:
        "201":
          description: Created corporate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Corporate"

  /corporates/{id}:
    get:
      operationId: getCorporate
      tags: [corporates]
      summary: Get corporate account details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Corporate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Corporate"
    put:
      operationId: updateCorporate
      tags: [corporates]
      summary: Update corporate account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCorporateInput"
      responses:
        "200":
          description: Updated corporate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Corporate"

  # ── Quotes ────────────────────────────────────────────────────────────────
  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List quotes for a corporate
      parameters:
        - name: corporate_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Generate an instant quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteInput"
      responses:
        "201":
          description: Generated quote with line items and totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get a quote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Quote details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/convert:
    post:
      operationId: convertQuoteToOrder
      tags: [quotes]
      summary: Convert an accepted quote into an order
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: corporate_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get full order details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order with items and timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
    put:
      operationId: updateOrder
      tags: [orders]
      summary: Update order (admin — status, delivery date, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderInput"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel an order
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Recipients ────────────────────────────────────────────────────────────
  /recipients:
    get:
      operationId: listRecipients
      tags: [recipients]
      summary: List recipients for an order
      parameters:
        - name: order_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of recipients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipient"
    post:
      operationId: createRecipient
      tags: [recipients]
      summary: Add a single recipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipientInput"
      responses:
        "201":
          description: Created recipient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"

  /recipients/bulk:
    post:
      operationId: bulkCreateRecipients
      tags: [recipients]
      summary: Bulk upload recipients (CSV payload) with personalisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateRecipientsInput"
      responses:
        "201":
          description: Bulk upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRecipientsResult"

  /recipients/{id}:
    put:
      operationId: updateRecipient
      tags: [recipients]
      summary: Update recipient personalisation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipientInput"
      responses:
        "200":
          description: Updated recipient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipient"
    delete:
      operationId: deleteRecipient
      tags: [recipients]
      summary: Remove a recipient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  # ── Invoices ──────────────────────────────────────────────────────────────
  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices for a corporate
      parameters:
        - name: corporate_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Generate a KRA-compliant invoice for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceInput"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get overview stats for the admin dashboard
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/corporate/{corporateId}:
    get:
      operationId: getCorporateDashboard
      tags: [dashboard]
      summary: Get dashboard data for a specific corporate account
      parameters:
        - name: corporateId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Corporate dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorporateDashboard"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get the most recent orders across all corporates
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Most ordered products in a date range
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Top products by order volume
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

# ── Schemas ──────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: string

    # ── Category ──────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        product_count:
          type: integer

    # ── Supplier ──────────────────────────────────────────────────────────
    Supplier:
      type: object
      required: [id, name, county, is_verified, onboarding_status, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        contact_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        county:
          type: string
        description:
          type: string
          nullable: true
        story:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        is_verified:
          type: boolean
        onboarding_status:
          type: string
          enum: [pending, under_review, approved, rejected]
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    CreateSupplierInput:
      type: object
      required: [name, county, contact_name, email, phone]
      properties:
        name:
          type: string
        county:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        description:
          type: string
          nullable: true
        story:
          type: string
          nullable: true

    UpdateSupplierInput:
      type: object
      properties:
        name:
          type: string
        county:
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        description:
          type: string
          nullable: true
        story:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        is_verified:
          type: boolean
        onboarding_status:
          type: string
          enum: [pending, under_review, approved, rejected]

    # ── Product ───────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, category_id, supplier_id, unit_price, moq, lead_time_days, origin, is_active, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        category_id:
          type: string
        category:
          $ref: "#/components/schemas/Category"
          nullable: true
        supplier_id:
          type: string
        supplier:
          $ref: "#/components/schemas/Supplier"
          nullable: true
        unit_price:
          type: number
          description: Price in KES per unit at MOQ
        bulk_tiers:
          type: array
          items:
            $ref: "#/components/schemas/BulkPriceTier"
        moq:
          type: integer
          description: Minimum order quantity
        lead_time_days:
          type: integer
        origin:
          type: string
          description: County/region of origin
        tags:
          type: array
